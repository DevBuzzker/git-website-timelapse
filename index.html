<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Git Timelapse Player</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── THEME TOKENS ── */
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #21262d;
      --border:    #30363d;
      --border2:   #21262d;
      --text:      #e6edf3;
      --text-muted:#8b949e;
      --text-dim:  #484f58;
      --accent:    #58a6ff;
      --accent2:   #79c0ff;
      --active-bg: #1f2d3d;
      --hover-bg:  #1c2128;
      --hover-btn: #2d333b;
      --preview-bg:#010409;
    }

    [data-theme="light"] {
      --bg:        #ffffff;
      --surface:   #f6f8fa;
      --surface2:  #eaeef2;
      --border:    #d0d7de;
      --border2:   #eaeef2;
      --text:      #1f2328;
      --text-muted:#656d76;
      --text-dim:  #b0bac4;
      --accent:    #0969da;
      --accent2:   #0550ae;
      --active-bg: #dbeafe;
      --hover-bg:  #f3f4f6;
      --hover-btn: #e5e7eb;
      --preview-bg:#f0f2f5;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background .2s, color .2s;
    }

    /* ── TOP BAR ── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #topbar h1 {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      white-space: nowrap;
    }

    #repo-form {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
    }

    #repo-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-family: monospace;
      outline: none;
      min-width: 0;
      transition: border-color .15s, background .2s, color .2s;
    }
    #repo-input:focus { border-color: var(--accent); }
    #repo-input::placeholder { color: var(--text-dim); }

    #repo-submit {
      background: #238636;
      border: 1px solid #2ea043;
      color: #fff;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .12s;
      flex-shrink: 0;
    }
    #repo-submit:hover { background: #2ea043; }

    #loading-msg {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── THEME TOGGLE ── */
    #theme-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      cursor: pointer;
      user-select: none;
    }

    #theme-toggle .icon { font-size: 14px; }

    .toggle-track {
      width: 36px;
      height: 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      position: relative;
      transition: background .2s;
    }

    [data-theme="light"] .toggle-track { background: var(--accent); border-color: var(--accent); }

    .toggle-thumb {
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: transform .2s;
      box-shadow: 0 1px 3px rgba(0,0,0,.3);
    }

    [data-theme="light"] .toggle-thumb { transform: translateX(16px); }

    /* ── MAIN LAYOUT ── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      width: 260px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background .2s;
    }

    #sidebar-header {
      padding: 10px 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #commit-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .commit-item {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border2);
      cursor: pointer;
      transition: background .12s;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .commit-item:hover { background: var(--hover-bg); }
    .commit-item.active { background: var(--active-bg); border-left: 3px solid var(--accent); }

    .commit-item .msg {
      font-size: 12px;
      line-height: 1.4;
      color: var(--text);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .commit-item .meta {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      gap: 6px;
    }

    .commit-item .sha-tag {
      font-family: monospace;
      background: var(--surface2);
      border-radius: 4px;
      padding: 1px 4px;
      font-size: 10px;
      color: var(--accent2);
    }

    /* ── VIEWER ── */
    #viewer {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── COMMIT INFO BAR ── */
    #commit-info {
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: background .2s;
    }

    #commit-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--border);
      object-fit: cover;
    }

    #commit-text { flex: 1; min-width: 0; }

    #commit-msg {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    #commit-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    #commit-sub span { color: var(--accent2); font-family: monospace; }

    #open-gh {
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
      flex-shrink: 0;
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      white-space: nowrap;
      transition: background .12s;
    }
    #open-gh:hover { background: var(--hover-bg); }

    /* ── IFRAME ── */
    #preview-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--preview-bg);
    }

    #preview {
      width: 100%;
      height: 100%;
      border: none;
    }

    #overlay-msg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      font-size: 14px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── CONTROLS ── */
    #controls {
      padding: 10px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background .2s;
    }

    .ctrl-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .12s;
      font-size: 14px;
    }
    .ctrl-btn:hover:not(:disabled) { background: var(--hover-btn); }
    .ctrl-btn:disabled { opacity: .35; cursor: default; }

    #play-btn {
      width: 38px;
      height: 38px;
      background: #238636;
      border-color: #2ea043;
      color: #fff;
      font-size: 16px;
    }
    #play-btn:hover:not(:disabled) { background: #2ea043; }
    #play-btn.playing { background: #6e3a3a; border-color: #b44; }
    #play-btn.playing:hover { background: #8a4040; }

    #scrubber {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    #scrubber::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      transition: transform .1s;
    }
    #scrubber::-webkit-slider-thumb:hover { transform: scale(1.2); }

    #counter {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      min-width: 60px;
      text-align: right;
    }

    #speed-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 4px 6px;
      font-size: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <h1>⏱ Git Timelapse</h1>
  <form id="repo-form">
    <input id="repo-input" type="text" placeholder="owner/repo or full GitHub URL"
           value="DevBuzzker/primer-team1-pigeon" spellcheck="false" autocomplete="off" />
    <button id="repo-submit" type="submit">Load</button>
  </form>
  <span id="loading-msg"></span>
  <label id="theme-toggle" title="Toggle light/dark mode">
    <span class="icon">🌙</span>
    <div class="toggle-track"><div class="toggle-thumb"></div></div>
    <span class="icon">☀️</span>
  </label>
</div>

<!-- MAIN -->
<div id="main">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-header">Commits</div>
    <div id="commit-list"></div>
  </div>

  <!-- VIEWER -->
  <div id="viewer">
    <div id="commit-info">
      <img id="commit-avatar" src="" alt="" />
      <div id="commit-text">
        <div id="commit-msg">Select a commit to preview</div>
        <div id="commit-sub">&nbsp;</div>
      </div>
      <a id="open-gh" href="#" target="_blank" rel="noopener" style="display:none">↗ GitHub</a>
    </div>

    <div id="preview-wrap">
      <div id="overlay-msg"><span>← pick a commit or press Play</span></div>
      <iframe id="preview" sandbox="allow-scripts allow-same-origin allow-forms" title="Site preview"></iframe>
    </div>

    <div id="controls">
      <button class="ctrl-btn" id="first-btn" title="First commit" disabled>⏮</button>
      <button class="ctrl-btn" id="prev-btn" title="Previous" disabled>◀</button>
      <button class="ctrl-btn" id="play-btn" title="Play / Pause" disabled>▶</button>
      <button class="ctrl-btn" id="next-btn" title="Next" disabled>▶</button>
      <button class="ctrl-btn" id="last-btn" title="Last commit" disabled>⏭</button>

      <input type="range" id="scrubber" min="0" value="0" disabled />

      <span id="counter">— / —</span>
      <button class="ctrl-btn" id="copy-link-btn" title="Copy permalink to this repo">🔗</button>

      <select id="speed-select" title="Playback speed">
        <option value="4000">0.25×</option>
        <option value="2000">0.5×</option>
        <option value="1500" selected>1×</option>
        <option value="800">2×</option>
        <option value="400">4×</option>
      </select>
    </div>
  </div>
</div>

<script>
  let REPO = 'DevBuzzker/primer-team1-pigeon';
  let API  = `https://api.github.com/repos/${REPO}/commits?per_page=100`;

  let savedScrollY = 0;

  let commits = [];
  let current = -1;
  let playTimer = null;

  const $ = id => document.getElementById(id);

  // ── FETCH ALL COMMITS (paginate) ──
  async function fetchAllCommits() {
    let url = API;
    let all = [];
    while (url) {
      const res = await fetch(url);
      const data = await res.json();
      all = all.concat(data);
      const link = res.headers.get('Link') || '';
      const next = link.match(/<([^>]+)>;\s*rel="next"/);
      url = next ? next[1] : null;
    }
    return all.reverse(); // oldest → newest
  }

  // ── BUILD SIDEBAR ──
  function buildList() {
    const list = $('commit-list');
    list.innerHTML = '';
    commits.forEach((c, i) => {
      const msg = c.commit.message.split('\n')[0];
      const date = new Date(c.commit.author.date).toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'});
      const author = c.commit.author.name;
      const sha = c.sha.slice(0, 7);

      const item = document.createElement('div');
      item.className = 'commit-item';
      item.dataset.i = i;
      item.innerHTML = `
        <div class="msg">${escHtml(msg)}</div>
        <div class="meta">
          <span class="sha-tag">${sha}</span>
          <span>${escHtml(author)}</span>
          <span>${date}</span>
        </div>`;
      item.addEventListener('click', () => goTo(i));
      list.appendChild(item);
    });
  }

  // ── GO TO COMMIT ──
  function goTo(i) {
    if (i < 0 || i >= commits.length) return;
    current = i;

    // sidebar highlight
    document.querySelectorAll('.commit-item').forEach(el => el.classList.remove('active'));
    const activeEl = document.querySelector(`.commit-item[data-i="${i}"]`);
    if (activeEl) {
      activeEl.classList.add('active');
      activeEl.scrollIntoView({ block: 'nearest' });
    }

    // info bar
    const c = commits[i];
    const msg = c.commit.message.split('\n')[0];
    const date = new Date(c.commit.author.date).toLocaleString('en-GB');
    const author = c.commit.author.name;
    const sha = c.sha.slice(0, 7);
    const avatar = c.author?.avatar_url || '';

    $('commit-avatar').src = avatar;
    $('commit-msg').textContent = msg;
    $('commit-sub').innerHTML = `by <b>${escHtml(author)}</b> · ${date} · <span>${sha}</span>`;

    const ghLink = $('open-gh');
    ghLink.href = c.html_url;
    ghLink.style.display = '';

    // scrubber + counter
    $('scrubber').value = i;
    $('counter').textContent = `${i + 1} / ${commits.length}`;

    // controls
    $('prev-btn').disabled = i === 0;
    $('first-btn').disabled = i === 0;
    $('next-btn').disabled = i === commits.length - 1;
    $('last-btn').disabled = i === commits.length - 1;

    // save scroll position before switching
    try { savedScrollY = $('preview').contentWindow.scrollY || 0; } catch(e) { savedScrollY = 0; }

    const ov = $('overlay-msg');
    ov.innerHTML = '<div class="spinner"></div><span>Loading preview…</span>';
    ov.style.display = 'flex';

    // jsDelivr serves files with correct MIME types (unlike raw.githubusercontent.com)
    const base = `https://cdn.jsdelivr.net/gh/${REPO}@${c.sha}/`;
    fetch(base + 'index.html')
      .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(html => {
        // inject <base> so relative CSS/JS/img paths resolve via jsDelivr
        if (/<base[\s>]/i.test(html)) {
          html = html.replace(/<base[^>]*>/i, `<base href="${base}">`);
        } else {
          html = html.replace(/(<head[^>]*>)/i, `$1<base href="${base}">`);
        }
        const frame = $('preview');
        frame.srcdoc = html;
        frame.onload = () => {
          ov.style.display = 'none';
          try { frame.contentWindow.scrollTo({ top: savedScrollY, behavior: 'instant' }); } catch(e) {}
        };
      })
      .catch(() => {
        ov.innerHTML = '<span>⚠ Preview unavailable for this commit</span>';
      });
  }

  // ── PLAYBACK ──
  function play() {
    const btn = $('play-btn');
    btn.textContent = '⏸';
    btn.classList.add('playing');
    btn.title = 'Pause';
    advance();
  }

  function advance() {
    const delay = parseInt($('speed-select').value, 10);
    playTimer = setTimeout(() => {
      if (current < commits.length - 1) {
        goTo(current + 1);
        advance();
      } else {
        stop();
      }
    }, delay);
  }

  function stop() {
    clearTimeout(playTimer);
    playTimer = null;
    const btn = $('play-btn');
    btn.textContent = '▶';
    btn.classList.remove('playing');
    btn.title = 'Play';
  }

  function togglePlay() {
    if (playTimer) { stop(); return; }
    if (current === commits.length - 1) goTo(0);
    play();
  }

  // ── WIRE CONTROLS ──
  $('play-btn').addEventListener('click', togglePlay);
  $('prev-btn').addEventListener('click', () => { stop(); goTo(current - 1); });
  $('next-btn').addEventListener('click', () => { stop(); goTo(current + 1); });
  $('first-btn').addEventListener('click', () => { stop(); goTo(0); });
  $('last-btn').addEventListener('click', () => { stop(); goTo(commits.length - 1); });

  $('scrubber').addEventListener('input', e => {
    stop();
    goTo(parseInt(e.target.value, 10));
  });

  // keyboard nav
  document.addEventListener('keydown', e => {
    if (!commits.length) return;
    if (e.key === 'ArrowRight') { stop(); goTo(current + 1); }
    if (e.key === 'ArrowLeft')  { stop(); goTo(current - 1); }
    if (e.key === ' ') { e.preventDefault(); togglePlay(); }
  });

  // ── INIT ──
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function parseRepo(raw) {
    raw = raw.trim();
    // github.com/owner/repo
    const ghCom = raw.match(/github\.com\/([^/]+\/[^/\s?#]+)/);
    if (ghCom) return ghCom[1].replace(/\.git$/, '');
    // owner.github.io/repo
    const ghPages = raw.match(/([^/:.]+)\.github\.io\/([^/\s?#]+)/);
    if (ghPages) return `${ghPages[1]}/${ghPages[2]}`;
    // plain owner/repo
    if (/^[\w.-]+\/[\w.-]+$/.test(raw)) return raw;
    return null;
  }

  async function loadRepo() {
    const input = $('repo-input').value;
    const repo = parseRepo(input);
    if (!repo) {
      $('loading-msg').textContent = '⚠ Invalid repo';
      return;
    }

    stop();
    commits = [];
    current = -1;
    $('commit-list').innerHTML = '';
    $('preview').src = '';
    $('overlay-msg').style.display = 'flex';
    $('overlay-msg').innerHTML = '<div class="spinner"></div><span>Loading commits…</span>';
    $('commit-msg').textContent = 'Loading…';
    $('commit-sub').innerHTML = '&nbsp;';
    $('open-gh').style.display = 'none';
    $('play-btn').disabled = true;
    $('scrubber').disabled = true;
    ['prev-btn','next-btn','first-btn','last-btn'].forEach(id => $(id).disabled = true);
    $('loading-msg').textContent = '';

    REPO = repo;
    API  = `https://api.github.com/repos/${REPO}/commits?per_page=100`;
    location.hash = repo;

    try {
      commits = await fetchAllCommits();
      $('loading-msg').textContent = `${commits.length} commits`;
      $('overlay-msg').style.display = 'none';

      buildList();

      const s = $('scrubber');
      s.max = commits.length - 1;
      s.disabled = false;
      $('play-btn').disabled = false;

      goTo(0);
      play();
    } catch (err) {
      $('loading-msg').textContent = '⚠ Error loading commits';
      $('overlay-msg').innerHTML = '<span>⚠ Could not load commits — check the repo name</span>';
      console.error(err);
    }
  }

  $('repo-form').addEventListener('submit', e => { e.preventDefault(); loadRepo(); });

  // ── COPY LINK ──
  $('copy-link-btn').addEventListener('click', () => {
    navigator.clipboard.writeText(location.href).then(() => {
      const btn = $('copy-link-btn');
      btn.textContent = '✓';
      setTimeout(() => { btn.textContent = '🔗'; }, 1500);
    });
  });

  // ── HASH → pre-fill input ──
  const hash = location.hash.slice(1);
  if (hash) {
    const fromHash = parseRepo(decodeURIComponent(hash));
    if (fromHash) $('repo-input').value = fromHash;
  }

  // ── THEME TOGGLE ──
  const saved = localStorage.getItem('theme') ?? 'light';
  if (saved === 'light') document.documentElement.dataset.theme = 'light';

  $('theme-toggle').addEventListener('click', () => {
    const next = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
    document.documentElement.dataset.theme = next === 'dark' ? '' : next;
    localStorage.setItem('theme', next);
  });

  loadRepo();
</script>
</body>
</html>
